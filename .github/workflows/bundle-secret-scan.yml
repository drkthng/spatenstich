name: Bundle Secret Scan (reusable)
on:
  workflow_call:
    inputs:
      bundle_dir:
        required: false
        type: string
        default: app/dist
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan bundle for secrets
        run: bash scripts/check-claude-key-in-bundle.sh ${{ inputs.bundle_dir }}
